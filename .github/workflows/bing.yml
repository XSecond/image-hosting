name: Get Bing Wallpaper (Custom Template Edition)
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      base_path:
        description: '基础保存目录'
        required: true
        default: 'probe/images/bing-images'
      naming_template:
        description: '命名模板 (可用变量: {date}, {original}, {res}, {sequence})'
        required: true
        default: '{date}-{original}-{res}'
      resolution:
        description: '下载清晰度'
        required: true
        default: 'UHD'
        type: choice
        options: [UHD, 1920x1080]
      md5_file_path:
        description: 'MD5记录文件路径'
        required: true
        default: 'probe/images/bing-images/.md5_history'

# 全局配置
env:
  TZ: Asia/Shanghai 
permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Fetch, Process and Push
        run: |
          # 开启严格模式：命令错误/变量未定义/管道错误时立即退出
          set -euo pipefail

          # 1. 变量初始化（兼容定时触发和手动触发）
          BASE_PATH="${{ github.event.inputs.base_path || 'bing-images' }}"
          TEMPLATE="${{ github.event.inputs.naming_template || '{date}-{original}-{res}' }}"
          RES_MODE="${{ github.event.inputs.resolution || 'UHD' }}"
          MD5_PATH="${{ github.event.inputs.md5_file_path || '.md5_history' }}"
          
          YEAR_MONTH="$(date +%Y/%m)"
          FULL_SAVE_PATH="${BASE_PATH}/${YEAR_MONTH}"
          mkdir -p "$FULL_SAVE_PATH"
          mkdir -p "$(dirname "$MD5_PATH")"

          # 2. 全量 MD5 同步
          if [ -d "$BASE_PATH" ]; then
            find "$BASE_PATH" -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) -exec md5sum {} + | awk '{print $1}' > "$MD5_PATH"
          else
            touch "$MD5_PATH"
          fi

          # 3. 请求Bing API并校验返回有效性
          API_DATA=$(curl -s "https://cn.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1")
          RAW_URL=$(echo "$API_DATA" | jq -r '.images[0].url')
          
          if [[ "$RAW_URL" == "null" || -z "$RAW_URL" ]]; then
            echo "错误：Bing API返回异常，无法获取壁纸地址"
            exit 1
          fi

          # 拼接最终下载地址
          FINAL_URL="https://www.bing.com${RAW_URL/1920x1080/$RES_MODE}"
          
          # 4. 下载壁纸并校验文件有效性（支持网络重试）
          rm -f temp_bing.jpg
          curl -L --fail --retry 3 --retry-delay 2 "$FINAL_URL" -o "temp_bing.jpg"
          
          if ! file temp_bing.jpg | grep -qE 'JPEG image|PNG image'; then
            echo "错误：下载的文件不是有效图片"
            rm -f temp_bing.jpg
            exit 1
          fi

          # 5. MD5去重校验
          NEW_MD5=$(md5sum "temp_bing.jpg" | awk '{print $1}')
          if grep -q "$NEW_MD5" "$MD5_PATH"; then
            echo "MD5 重复，当前壁纸已存在，跳过保存和提交。"
            rm temp_bing.jpg
            exit 0
          fi

          # 6. 解析模板变量生成文件名
          V_DATE="$(date +%Y-%m-%d)"
          V_ORIGINAL=$(echo "$API_DATA" | jq -r '.images[0].urlbase' | sed 's/.*id=//; s/_[^_]*$//')
          [[ "$RES_MODE" == "UHD" ]] && V_RES="3840x2160" || V_RES="1920x1080"
          
          V_SEQ_NUM=$(find "$FULL_SAVE_PATH" -maxdepth 1 -type f | wc -l)
          V_SEQ=$(printf "%03d" $((V_SEQ_NUM + 1)))

          FILENAME="$TEMPLATE"
          FILENAME="${FILENAME//\{date\}/$V_DATE}"
          FILENAME="${FILENAME//\{original\}/$V_ORIGINAL}"
          FILENAME="${FILENAME//\{res\}/$V_RES}"
          FILENAME="${FILENAME//\{sequence\}/$V_SEQ}"
          FILENAME="${FILENAME}.jpg"

          # 文件名冲突处理
          if [[ -f "${FULL_SAVE_PATH}/${FILENAME}" ]]; then
             FILENAME="${FILENAME%.*}-$(date +%H%M%S).jpg"
          fi

          # 7. 保存文件并更新MD5记录
          mv temp_bing.jpg "${FULL_SAVE_PATH}/${FILENAME}"
          echo "$NEW_MD5" >> "$MD5_PATH"
          echo "成功归档: ${FULL_SAVE_PATH}/${FILENAME}"

          # 8. 提交推送（仅在有新文件时执行，变量同会话直接可用，无空路径问题）
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "$BASE_PATH" "$MD5_PATH"
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "archive: custom template sync $(date +%Y-%m-%d)"
            git push origin HEAD:${{ github.ref }}
            echo "已成功提交到仓库"
          fi
